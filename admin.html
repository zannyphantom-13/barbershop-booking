<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharp Edge | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h2><span class="logo-icon">💈</span> Admin Access</h2>
            <p>Please enter the master password to manage bookings.</p>
            <input type="password" id="adminPassword" placeholder="Password (admin123)">
            <button id="loginBtn" class="btn btn-primary">Login</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardScreen" class="dashboard-screen" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>SHARP EDGE</h2>
                <span class="badge">ADMIN</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active">Bookings</button>
                <button class="nav-btn text-danger" id="logoutBtn">Logout</button>
            </nav>
        </aside>

        <!-- Content Area -->
        <main class="main-content">
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button id="mobileMenuBtn" class="mobile-toggle">☰</button>
                    <div>
                        <h1>Live Bookings</h1>
                        <p class="subtitle">Manage incoming appointments instantly.</p>
                    </div>
                </div>
                <div class="stats-mini">
                    <div class="stat-box">
                        <span id="statPending">0</span> Pending
                    </div>
                </div>
            </header>

            <section class="appointments-section">
                <!-- Filters -->
                <div class="filters">
                    <button class="filter-btn active" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="complete">Completed</button>
                    <button class="filter-btn" data-filter="all">All Bookings</button>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Client Name</th>
                                <th>Contact</th>
                                <th>Service</th>
                                <th>Barber</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody">
                            <!-- Populated by admin.js -->
                        </tbody>
                    </table>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        No bookings found for this filter.
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
